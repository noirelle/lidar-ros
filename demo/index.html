<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR Mission Control | Minimalist</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        :root {
            --bg-light: #fcfcfc;
            --panel-bg: #ffffff;
            --accent: #000000;
            --accent-glow: rgba(0, 0, 0, 0.05);
            --success: #000000; /* Black for minimalist feel, use dot color for status */
            --success-actual: #27ae60;
            --border-color: #e0e0e0;
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --sidebar-width: 320px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'SF Mono', 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 100;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
        }

        .logo {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: var(--accent);
            color: var(--panel-bg);
            padding: 8px 16px;
            text-transform: uppercase;
            display: inline-block;
            width: fit-content;
        }

        .telemetry-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .telemetry-card h3 {
            margin: 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
            padding-left: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 4px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .data-label { color: var(--text-muted); }
        .data-value { color: var(--accent); font-weight: 600; }

        /* Main Viewport */
        main {
            position: relative;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        #visualizer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Crisp rendering for Technical Map */
        }

        /* HUD Overlay */
        .hud-info {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--panel-bg);
            padding: 12px 20px;
            border: 1px solid var(--accent);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .hud-bottom {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .version-tag {
            position: fixed;
            top: 10px;
            right: 170px;
            font-family: monospace;
            font-size: 0.7rem;
            color: rgba(0,0,0,0.3);
        }

        #status-dot.online { background: var(--accent); }
    </style>
</head>
<body>

    <div class="version-tag">UI_VER: 2.0.4 [STABLE]</div>

    <aside>
        <div class="logo">
            LIDAR SYSTEM
        </div>

        <div class="telemetry-card">
            <h3>Diagnostic</h3>
            <div class="data-row">
                <span class="data-label">Link</span>
                <span class="data-value" id="conn-text">DISCONNECTED</span>
            </div>
            <div class="data-row">
                <span class="data-label">State</span>
                <span class="data-value" id="sys-state">STANDBY</span>
            </div>
            <div class="data-row">
                <span class="data-label">Hz</span>
                <span class="data-value" id="scan-hz">0.00</span>
            </div>
            <div class="data-row">
                <span class="data-label">Pulse</span>
                <span class="data-value" id="data-pulse">---</span>
            </div>
        </div>

        <div class="telemetry-card">
            <h3>Cartesian Pose</h3>
            <div class="data-row">
                <span class="data-label">X_MTR</span>
                <span class="data-value" id="pose-x">0.000</span>
            </div>
            <div class="data-row">
                <span class="data-label">Y_MTR</span>
                <span class="data-value" id="pose-y">0.000</span>
            </div>
            <div class="data-row">
                <span class="data-label">YAW_DEG</span>
                <span class="data-value" id="pose-yaw">0.00</span>
            </div>
        </div>

        <div class="telemetry-card" style="margin-top: auto;">
            <h3>Environment</h3>
            <div class="data-row">
                <span class="data-label">Map Size</span>
                <span class="data-value" id="map-size">0.0x0.0 m</span>
            </div>
            <div class="data-row">
                <span class="data-label">Scale</span>
                <span class="data-value" id="zoom-text">5.0m</span>
            </div>
        </div>
    </aside>

    <main id="main-viewport">
        <div id="visualizer-container">
            <canvas id="gridLayer"></canvas>
            <canvas id="mapLayer"></canvas>
            <canvas id="scanLayer"></canvas>
            <canvas id="uiLayer"></canvas>
        </div>

        <div class="hud-info">
            AUTO-SCAN: ACTIVE
        </div>

        <div class="hud-bottom">
            <div><span id="conn-label">WS-LINK</span></div>
            <div>COORDINATE_SYS: MAP_RELATIVE</div>
        </div>
    </main>

    <script>
        // --- State Management ---
        const state = {
            connected: false,
            robot: { x: 0, y: 0, yaw: 0 },
            view: { zoom: 5.0, centerX: 0, centerY: 0 },
            scan: { points: [], hz: 0, lastTime: Date.now() },
            map: { points: [], size: '0.0x0.0 m' },
            status: { conn: 'DISCONNECTED', sys: 'STANDBY', pulse: '---' }
        };

        // --- ROS Configuration ---
        const ros = new ROSLIB.Ros({
            url: 'ws://' + window.location.hostname + ':9090'
        });

        const dom = {
            connText: document.getElementById('conn-text'),
            sysState: document.getElementById('sys-state'),
            scanHz: document.getElementById('scan-hz'),
            dataPulse: document.getElementById('data-pulse'),
            poseX: document.getElementById('pose-x'),
            poseY: document.getElementById('pose-y'),
            poseYaw: document.getElementById('pose-yaw'),
            mapSize: document.getElementById('map-size'),
            zoomText: document.getElementById('zoom-text')
        };

        ros.on('connection', () => {
            state.connected = true;
            state.status.conn = 'CONNECTED';
            state.status.sys = 'STREAMING';
        });

        ros.on('close', () => {
            state.connected = false;
            state.status.conn = 'DISCONNECTED';
            state.status.sys = 'STANDBY';
        });

        // --- Viewport & Layers ---
        const container = document.getElementById('main-viewport');
        const layers = {
            grid: document.getElementById('gridLayer'),
            map: document.getElementById('mapLayer'),
            scan: document.getElementById('scanLayer'),
            ui: document.getElementById('uiLayer')
        };
        const ctxs = Object.fromEntries(Object.entries(layers).map(([k, v]) => {
            const ctx = v.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            return [k, ctx];
        }));

        function resize() {
            Object.values(layers).forEach(c => {
                c.width = container.clientWidth;
                c.height = container.clientHeight;
                c.getContext('2d').imageSmoothingEnabled = false;
            });
        }
        window.addEventListener('resize', resize);
        resize();

        function worldToCanvas(x, y) {
            const size = Math.min(layers.grid.width, layers.grid.height);
            const scale = size / (state.view.zoom * 2);
            const dx = (x - state.view.centerX) * scale;
            const dy = (y - state.view.centerY) * scale;
            return {
                x: Math.round((layers.grid.width / 2) + dx),
                y: Math.round((layers.grid.height / 2) - dy)
            };
        }

        // --- ROS Subscriptions (State Updates Only) ---
        const scanTopic = new ROSLIB.Topic({ ros: ros, name: '/scan', messageType: 'sensor_msgs/LaserScan' });
        scanTopic.subscribe(msg => {
            const now = Date.now();
            state.scan.hz = (1000 / (now - state.scan.lastTime)).toFixed(2);
            state.scan.lastTime = now;

            const newPoints = [];
            const angleMin = msg.angle_min;
            const angleInc = msg.angle_increment;

            for (let i = 0; i < msg.ranges.length; i++) {
                const r = msg.ranges[i];
                if (r > msg.range_min && r < msg.range_max) {
                    const angle = angleMin + (i * angleInc) + state.robot.yaw;
                    newPoints.push({
                        x: state.robot.x + r * Math.sin(angle),
                        y: state.robot.y + r * Math.cos(angle)
                    });
                }
            }
            state.scan.points = newPoints;
        });

        const tfTopic = new ROSLIB.Topic({ ros: ros, name: '/tf', messageType: 'tf2_msgs/msg/TFMessage' });
        tfTopic.subscribe(msg => {
            msg.transforms.forEach(t => {
                if (t.header.frame_id === 'map' || t.header.frame_id === '/map') {
                    state.status.pulse = new Date().toLocaleTimeString() + ' [TF_LIVE]';
                    state.robot.x = t.transform.translation.x;
                    state.robot.y = t.transform.translation.y;
                    const q = t.transform.rotation;
                    state.robot.yaw = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z));
                    
                    state.view.centerX = state.robot.x;
                    state.view.centerY = state.robot.y;
                }
            });
        });

        const mapTopic = new ROSLIB.Topic({ ros: ros, name: '/map', messageType: 'nav_msgs/OccupancyGrid' });
        mapTopic.subscribe(msg => {
            const info = msg.info;
            const data = msg.data;
            state.map.size = (info.width * info.resolution).toFixed(1) + 'x' + (info.height * info.resolution).toFixed(1) + ' m';

            const newMap = [];
            for (let i = 0; i < data.length; i++) {
                if (data[i] > 50) {
                    newMap.push({
                        x: (i % info.width) * info.resolution + info.origin.position.x,
                        y: Math.floor(i / info.width) * info.resolution + info.origin.position.y
                    });
                }
            }
            state.map.points = newMap;
        });

        // --- Rendering Logic (Synchronized) ---
        function render() {
            // Update DOM Elements
            dom.connText.innerText = state.status.conn;
            dom.sysState.innerText = state.status.sys;
            dom.scanHz.innerText = state.scan.hz;
            dom.dataPulse.innerText = state.status.pulse;
            dom.poseX.innerText = state.robot.x.toFixed(3);
            dom.poseY.innerText = state.robot.y.toFixed(3);
            dom.poseYaw.innerText = (state.robot.yaw * 180 / Math.PI).toFixed(2);
            dom.mapSize.innerText = state.map.size;
            dom.zoomText.innerText = state.view.zoom.toFixed(1) + 'm';

            // 1. Grid Layer
            const gCtx = ctxs.grid;
            gCtx.clearRect(0, 0, layers.grid.width, layers.grid.height);
            const step = 1.0;
            gCtx.strokeStyle = '#e0e0e0';
            gCtx.lineWidth = 1;
            const startX = Math.floor((state.view.centerX - state.view.zoom) / step) * step;
            const endX = Math.ceil((state.view.centerX + state.view.zoom) / step) * step;
            const startY = Math.floor((state.view.centerY - state.view.zoom) / step) * step;
            const endY = Math.ceil((state.view.centerY + state.view.zoom) / step) * step;

            for (let x = startX; x <= endX; x += step) {
                const p = worldToCanvas(x, 0);
                gCtx.beginPath(); gCtx.moveTo(p.x, 0); gCtx.lineTo(p.x, layers.grid.height); gCtx.stroke();
            }
            for (let y = startY; y <= endY; y += step) {
                const p = worldToCanvas(0, y);
                gCtx.beginPath(); gCtx.moveTo(0, p.y); gCtx.lineTo(layers.grid.width, p.y); gCtx.stroke();
            }

            // 2. Map Layer (The static built map)
            const mCtx = ctxs.map;
            mCtx.clearRect(0, 0, layers.map.width, layers.map.height);
            mCtx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            state.map.points.forEach(p => {
                const cp = worldToCanvas(p.x, p.y);
                mCtx.fillRect(cp.x - 1, cp.y - 1, 2, 2);
            });

            // 3. Scan Layer (Live points)
            const sCtx = ctxs.scan;
            sCtx.clearRect(0, 0, layers.scan.width, layers.scan.height);
            sCtx.fillStyle = '#000000';
            state.scan.points.forEach(p => {
                const cp = worldToCanvas(p.x, p.y);
                sCtx.fillRect(cp.x - 1, cp.y - 1, 2, 2);
            });

            // 4. UI Layer (Robot)
            const uCtx = ctxs.ui;
            uCtx.clearRect(0, 0, layers.ui.width, layers.ui.height);
            const rp = worldToCanvas(state.robot.x, state.robot.y);
            uCtx.save();
            uCtx.translate(rp.x, rp.y);
            uCtx.rotate(-state.robot.yaw);
            uCtx.fillStyle = '#000000';
            uCtx.beginPath();
            uCtx.moveTo(0, -8); uCtx.lineTo(6, 6); uCtx.lineTo(-6, 6); uCtx.closePath();
            uCtx.fill();
            uCtx.restore();
        }

        function animate() {
            render();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // --- Interaction ---
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) state.view.zoom = Math.max(1, state.view.zoom * 0.9);
            else state.view.zoom = Math.min(100, state.view.zoom * 1.1);
        });
    </script>
</body>
</html>
