<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiDAR Mission Control | Minimalist</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        :root {
            --bg-light: #fcfcfc;
            --panel-bg: #ffffff;
            --accent: #000000;
            --accent-glow: rgba(0, 0, 0, 0.05);
            --success: #000000; /* Black for minimalist feel, use dot color for status */
            --success-actual: #27ae60;
            --border-color: #e0e0e0;
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --sidebar-width: 320px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'SF Mono', 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 100;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
        }

        .telemetry-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .telemetry-card h3 {
            margin: 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
            padding-left: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 4px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .data-label { color: var(--text-muted); }
        .data-value { color: var(--accent); font-weight: 600; }

        /* Main Viewport */
        main {
            position: relative;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        #visualizer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Crisp rendering for Technical Map */
        }

        #status-dot.online { background: var(--accent); }

        /* Compass Styling */
        .compass {
            position: absolute;
            bottom: 32px;
            right: 32px;
            width: 80px;
            height: 80px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 50;
        }

        .compass::before {
            content: 'N';
            position: absolute;
            top: 6px;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--accent);
        }

        .compass-needle {
            width: 2px;
            height: 50px;
            background: rgba(0,0,0,0.1);
            position: relative;
            transform-origin: center center;
        }

        .compass-needle::after {
            content: '';
            position: absolute;
            top: 0;
            left: -4px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 12px solid var(--accent);
        }
    </style>
</head>
<body>

    <aside>

        <div class="telemetry-card">
            <h3>Diagnostic</h3>
            <div class="data-row">
                <span class="data-label">Link</span>
                <span class="data-value" id="conn-text">DISCONNECTED</span>
            </div>
            <div class="data-row">
                <span class="data-label">State</span>
                <span class="data-value" id="sys-state">STANDBY</span>
            </div>
            <div class="data-row">
                <span class="data-label">Hz</span>
                <span class="data-value" id="scan-hz">0.00</span>
            </div>
            <div class="data-row">
                <span class="data-label">Pulse</span>
                <span class="data-value" id="data-pulse">---</span>
            </div>
        </div>

        <div class="telemetry-card">
            <h3>Cartesian Pose</h3>
            <div class="data-row">
                <span class="data-label">X_MTR</span>
                <span class="data-value" id="pose-x">0.000</span>
            </div>
            <div class="data-row">
                <span class="data-label">Y_MTR</span>
                <span class="data-value" id="pose-y">0.000</span>
            </div>
            <div class="data-row">
                <span class="data-label">YAW_DEG</span>
                <span class="data-value" id="pose-yaw">0.00</span>
            </div>
        </div>

        <div class="telemetry-card" style="margin-top: auto;">
            <h3>Environment</h3>
            <div class="data-row">
                <span class="data-label">Map Size</span>
                <span class="data-value" id="map-size">0.0x0.0 m</span>
            </div>
            <div class="data-row">
                <span class="data-label">Scale</span>
                <span class="data-value" id="zoom-text">5.0m</span>
            </div>
        </div>
    </aside>

    <main id="main-viewport">
        <div id="visualizer-container">
            <canvas id="gridLayer"></canvas>
            <canvas id="mapLayer"></canvas>
            <canvas id="scanLayer"></canvas>
            <canvas id="uiLayer"></canvas>
        </div>

        <div class="compass">
            <div id="compass-needle" class="compass-needle"></div>
        </div>
    </main>

    <script>
        // --- ROS Configuration ---
        const ros = new ROSLIB.Ros({
            url: 'ws://' + window.location.hostname + ':9090'
        });

        const connText = document.getElementById('conn-text');
        const sysState = document.getElementById('sys-state');
        const dataPulse = document.getElementById('data-pulse');
        const compassNeedle = document.getElementById('compass-needle');

        ros.on('connection', () => {
            connText.innerText = 'CONNECTED';
            sysState.innerText = 'STREAMING';
        });

        ros.on('close', () => {
            connText.innerText = 'DISCONNECTED';
            sysState.innerText = 'STANDBY';
        });

        // --- Viewport State & Smooth Motion ---
        let zoom = 5.0; 
        let centerX = 0, centerY = 0; 
        
        // Target state (from ROS)
        const target = { x: 0, y: 0, yaw: 0 };
        // Current state (smoothed for display)
        const current = { x: 0, y: 0, yaw: 0 };
        const SMOOTH_FACTOR = 0.12; // Lower = smoother but more lag. 0.12 is a good balance.

        // --- UI State & Buffer ---
        const uiState = {
            latestScan: null,
            occupiedPoints: [], // Store world coordinates of walls
            needsRedraw: {
                grid: true,
                map: true,
                scan: false,
                ui: false
            }
        };

        const container = document.getElementById('main-viewport');
        const layers = {
            grid: document.getElementById('gridLayer'),
            map: document.getElementById('mapLayer'),
            scan: document.getElementById('scanLayer'),
            ui: document.getElementById('uiLayer')
        };
        const ctxs = Object.fromEntries(Object.entries(layers).map(([k, v]) => {
            const ctx = v.getContext('2d');
            ctx.imageSmoothingEnabled = true; // Use smoothing for fluid visuals
            return [k, ctx];
        }));

        function resize() {
            Object.values(layers).forEach(c => {
                c.width = container.clientWidth;
                c.height = container.clientHeight;
                const ctx = c.getContext('2d');
                ctx.imageSmoothingEnabled = true; 
            });
            drawGrid();
        }
        window.addEventListener('resize', resize);
        resize();

        function worldToCanvas(x, y) {
            const size = Math.min(layers.grid.width, layers.grid.height);
            const scale = size / (zoom * 2);
            const dx = (x - centerX) * scale;
            const dy = (y - centerY) * scale;
            return {
                x: (layers.grid.width / 2) + dx, // Use float coordinates for sub-pixel smoothness
                y: (layers.grid.height / 2) - dy
            };
        }

        // --- Grid Drawing (Blueprint Style) ---
        function drawGrid() {
            const ctx = ctxs.grid;
            ctx.clearRect(0, 0, layers.grid.width, layers.grid.height);
            
            const step = 1.0; 
            const size = Math.min(layers.grid.width, layers.grid.height);
            const scale = size / (zoom * 2);

            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;

            const startX = Math.floor((centerX - zoom) / step) * step;
            const endX = Math.ceil((centerX + zoom) / step) * step;
            const startY = Math.floor((centerY - zoom) / step) * step;
            const endY = Math.ceil((centerY + zoom) / step) * step;

            for (let x = startX; x <= endX; x += step) {
                const p = worldToCanvas(x, 0);
                ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x, layers.grid.height); ctx.stroke();
                
                ctx.fillStyle = '#757575';
                ctx.font = '8px monospace';
                ctx.fillText(x.toFixed(0), p.x + 4, 15);
            }

            for (let y = startY; y <= endY; y += step) {
                const p = worldToCanvas(0, y);
                ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(layers.grid.width, p.y); ctx.stroke();
                
                ctx.fillStyle = '#757575';
                ctx.font = '8px monospace';
                ctx.fillText(y.toFixed(0), 10, p.y - 4);
            }

            // Central Axes
            const origin = worldToCanvas(0, 0);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.arc(origin.x, origin.y, 3, 0, Math.PI*2);
            ctx.stroke();
        }

        // --- Scan Logic (Black Points) ---
        const scanTopic = new ROSLIB.Topic({ ros: ros, name: '/scan', messageType: 'sensor_msgs/LaserScan' });
        let lastScanTime = Date.now();
        
        scanTopic.subscribe(msg => {
            const now = Date.now();
            document.getElementById('scan-hz').innerText = (1000 / (now - lastScanTime)).toFixed(2);
            lastScanTime = now;

            uiState.latestScan = msg;
            uiState.needsRedraw.scan = true;
            uiState.needsRedraw.ui = true;
        });

        function drawScan() {
            const msg = uiState.latestScan;
            if (!msg) return;

            const ctx = ctxs.scan;
            ctx.clearRect(0, 0, layers.scan.width, layers.scan.height);
            
            ctx.fillStyle = '#000000';
            const angleMin = msg.angle_min;
            const angleInc = msg.angle_increment;

            for (let i = 0; i < msg.ranges.length; i++) {
                const r = msg.ranges[i];
                if (r > msg.range_min && r < msg.range_max) {
                    const angle = angleMin + (i * angleInc) + current.yaw;
                    const lx = target.x + r * Math.sin(angle);
                    const ly = target.y + r * Math.cos(angle);
                    
                    const p = worldToCanvas(lx, ly);
                    ctx.fillRect(p.x-1, p.y-1, 2, 2);
                }
            }
        }

        // --- High-Priority Raw TF Telemetry ---
        const tfTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/tf',
            messageType: 'tf2_msgs/msg/TFMessage'
        });

        tfTopic.subscribe(msg => {
            msg.transforms.forEach(transform => {
                // We are looking for the 'map' -> 'odom' or 'map' -> 'base_link' jump
                if (transform.header.frame_id === 'map' || transform.header.frame_id === '/map') {
                    const now = new Date();
                    dataPulse.innerText = now.toLocaleTimeString() + ' [TF_LIVE]';

                    const pos = transform.transform.translation;
                    const rot = transform.transform.rotation;
                    
                    // Update target state for interpolation
                    target.x = pos.x;
                    target.y = pos.y;
                    
                    const q = rot;
                    target.yaw = Math.atan2(2 * (q.w * q.z + q.x * q.y), 1 - 2 * (q.y * q.y + q.z * q.z));
                    
                    // Update DOM (Cartesian Pose - numeric values show raw data)
                    document.getElementById('pose-x').innerText = target.x.toFixed(3);
                    document.getElementById('pose-y').innerText = target.y.toFixed(3);
                    document.getElementById('pose-yaw').innerText = (target.yaw * 180 / Math.PI).toFixed(2);
                    
                    uiState.needsRedraw.ui = true; // Still flag for immediate update if needed
                }
            });
        });

        // --- Mapping (Unified Point Cloud Style) ---
        const mapTopic = new ROSLIB.Topic({ ros: ros, name: '/map', messageType: 'nav_msgs/OccupancyGrid' });

        mapTopic.subscribe(msg => {
            const info = msg.info;
            const data = msg.data;
            
            document.getElementById('map-size').innerText = 
                (info.width * info.resolution).toFixed(1) + 'x' + (info.height * info.resolution).toFixed(1) + ' m';

            // Extract occupied cells into a point list (Meters)
            uiState.occupiedPoints = [];
            for (let i = 0; i < data.length; i++) {
                if (data[i] > 50) { // Occupancy threshold
                    const x_idx = i % info.width;
                    const y_idx = Math.floor(i / info.width);
                    
                    // Convert to map world space
                    const wx = x_idx * info.resolution + info.origin.position.x;
                    const wy = y_idx * info.resolution + info.origin.position.y;
                    uiState.occupiedPoints.push({ x: wx, y: wy });
                }
            }
            uiState.needsRedraw.map = true;
        });

        function renderMap() {
            const ctx = ctxs.map;
            ctx.clearRect(0,0, layers.map.width, layers.map.height);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; // Subtler color for built map
            uiState.occupiedPoints.forEach(p => {
                const canvasP = worldToCanvas(p.x, p.y);
                ctx.fillRect(canvasP.x - 1, canvasP.y - 1, 2, 2);
            });
        }

        // --- Robot Indicator (Minimalist Triangle) ---
        function drawUI() {
            const ctx = ctxs.ui;
            ctx.clearRect(0,0, layers.ui.width, layers.ui.height);
            
            const p = worldToCanvas(current.x, current.y);
            
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(-current.yaw);
            
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(6, 6);
            ctx.lineTo(-6, 6);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        // --- Animation Loop ---
        function renderLoop() {
            // Smoothly interpolate current pose towards target
            current.x += (target.x - current.x) * SMOOTH_FACTOR;
            current.y += (target.y - current.y) * SMOOTH_FACTOR;
            
            // Yaw interpolation with wrap-around awareness
            let dyaw = target.yaw - current.yaw;
            while (dyaw > Math.PI) dyaw -= Math.PI * 2;
            while (dyaw < -Math.PI) dyaw += Math.PI * 2;
            current.yaw += dyaw * SMOOTH_FACTOR;

            // Camera follows the smoothed robot
            centerX = current.x;
            centerY = current.y;

            // Always redraw indicator and scan for maximum fluid motion
            drawUI();
            drawScan();

            // Update Compass
            if (compassNeedle) {
                compassNeedle.style.transform = `rotate(${-current.yaw}rad)`;
            }

            // Grid and Map only redraw on significant change or explicit flag
            if (uiState.needsRedraw.grid || Math.abs(dyaw) > 0.001) {
                drawGrid();
                uiState.needsRedraw.grid = false;
            }
            if (uiState.needsRedraw.map) {
                renderMap();
                uiState.needsRedraw.map = false;
            }

            requestAnimationFrame(renderLoop);
        }

        // Start render loop
        requestAnimationFrame(renderLoop);

        // --- Interaction ---
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) zoom = Math.max(1, zoom * 0.9);
            else zoom = Math.min(100, zoom * 1.1);
            document.getElementById('zoom-text').innerText = zoom.toFixed(1) + 'm';
            uiState.needsRedraw.grid = true;
            uiState.needsRedraw.map = true;
            uiState.needsRedraw.scan = true;
            uiState.needsRedraw.ui = true;
        });
    </script>
</body>
</html>
