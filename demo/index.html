<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDLidar Real-Time Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --accent-color: #58a6ff;
            --radar-line: rgba(88, 166, 255, 0.2);
            --point-color: #39d353;
            --text-color: #c9d1d9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #radar-container {
            position: relative;
            width: 85vh;
            height: 85vh;
            border-radius: 50%;
            background: radial-gradient(circle, #161b22 0%, #0d1117 70%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(88, 166, 255, 0.1);
            border: 1px solid var(--radar-line);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--radar-line);
            z-index: 10;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #ff7b72;
        }

        .status-dot.connected { background-color: #39d353; }

        h1 { font-size: 1.2rem; margin: 0 0 10px 0; color: var(--accent-color); }
        p { margin: 5px 0; font-size: 0.9rem; }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--radar-line);
        }

        .zoom-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>LiDAR System Status</h1>
        <p><span id="status-dot" class="status-dot"></span> Connection: <span id="status-text">Disconnected</span></p>
        <p>Topic: <span style="color: var(--accent-color)">/scan</span></p>
        <p>Points: <span id="point-count">0</span></p>
    </div>

    <div id="radar-container">
        <canvas id="gridCanvas"></canvas>
        <canvas id="pointCanvas"></canvas>
    </div>

    <div class="controls">
        <p>Use Mouse Wheel to Zoom</p>
    </div>

    <div class="zoom-info">Range: <span id="range-val">5.0</span>m</div>

    <script>
        const radarContainer = document.getElementById('radar-container');
        const gridCanvas = document.getElementById('gridCanvas');
        const pointCanvas = document.getElementById('pointCanvas');
        const gCtx = gridCanvas.getContext('2d');
        const pCtx = pointCanvas.getContext('2d');
        
        let scale = 50; // pixels per meter
        let maxRange = 10; // meters for grid
        let viewRange = 5.0;

        function resize() {
            const size = radarContainer.clientWidth;
            gridCanvas.width = gridCanvas.height = size;
            pointCanvas.width = pointCanvas.height = size;
            drawGrid();
        }

        window.addEventListener('resize', resize);
        resize();

        function drawGrid() {
            const center = gridCanvas.width / 2;
            gCtx.clearRect(0,0, gridCanvas.width, gridCanvas.height);
            
            gCtx.strokeStyle = 'rgba(88, 166, 255, 0.1)';
            gCtx.lineWidth = 1;

            // Draw concentric circles
            for (let r = 1; r <= maxRange; r++) {
                gCtx.beginPath();
                gCtx.arc(center, center, r * scale, 0, Math.PI * 2);
                gCtx.stroke();
                
                if (r % 2 === 0) {
                    gCtx.fillStyle = 'rgba(201, 209, 217, 0.3)';
                    gCtx.font = '10px Arial';
                    gCtx.fillText(r + 'm', center + r * scale + 5, center);
                }
            }

            // Draw crosshairs
            gCtx.beginPath();
            gCtx.moveTo(0, center); gCtx.lineTo(gridCanvas.width, center);
            gCtx.moveTo(center, 0); gCtx.lineTo(center, gridCanvas.height);
            gCtx.stroke();

            // Draw radial lines
            for (let a = 0; a < 360; a += 30) {
                const rad = a * Math.PI / 180;
                gCtx.beginPath();
                gCtx.moveTo(center, center);
                gCtx.lineTo(center + Math.cos(rad) * gridCanvas.width, center + Math.sin(rad) * gridCanvas.width);
                gCtx.stroke();
            }
        }

        // ROS connection
        const ros = new ROSLIB.Ros({
            url: 'ws://' + window.location.hostname + ':9090'
        });

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const pointCount = document.getElementById('point-count');
        const rangeVal = document.getElementById('range-val');

        ros.on('connection', () => {
            statusDot.classList.add('connected');
            statusText.innerText = 'Connected';
            console.log('Connected to websocket server.');
        });

        ros.on('error', (error) => {
            statusDot.classList.remove('connected');
            statusText.innerText = 'Error';
            console.log('Error connecting to websocket server: ', error);
        });

        ros.on('close', () => {
            statusDot.classList.remove('connected');
            statusText.innerText = 'Closed';
            console.log('Connection to websocket server closed.');
        });

        const scanTopic = new ROSLIB.Topic({
            ros: ros,
            name: '/scan',
            messageType: 'sensor_msgs/LaserScan'
        });

        scanTopic.subscribe((message) => {
            const center = pointCanvas.width / 2;
            pCtx.clearRect(0, 0, pointCanvas.width, pointCanvas.height);
            
            const ranges = message.ranges;
            const angleMin = message.angle_min;
            const angleIncrement = message.angle_increment;
            
            let count = 0;
            pCtx.fillStyle = '#39d353';
            
            for (let i = 0; i < ranges.length; i++) {
                const r = ranges[i];
                if (r > message.range_min && r < message.range_max) {
                    const angle = angleMin + (i * angleIncrement);
                    // ROS Convention: 0 is forward (+X), + angle is CCW
                    // Canvas Convention: 0 is right, + angle is CW
                    // We map ROS forward (+X) to Canvas Up (-Y)
                    const x = center + (r * scale) * Math.sin(angle);
                    const y = center - (r * scale) * Math.cos(angle);
                    
                    pCtx.beginPath();
                    pCtx.arc(x, y, 2, 0, Math.PI * 2);
                    pCtx.fill();
                    count++;
                }
            }
            pointCount.innerText = count;
        });

        // Zoom logic
        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) {
                viewRange = Math.max(1, viewRange - 0.5);
            } else {
                viewRange = Math.min(20, viewRange + 0.5);
            }
            scale = (gridCanvas.width / 2) / viewRange;
            rangeVal.innerText = viewRange.toFixed(1);
            drawGrid();
        });
    </script>
</body>
</html>
