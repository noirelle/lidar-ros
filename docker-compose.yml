services:
  ros2:
    build: .
    container_name: ros2_sim
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./src:/app/src
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    command: ["/bin/bash", "/app/src/start_demo.sh"]