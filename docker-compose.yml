services:
  ros2:
    build: .
    container_name: lidar_ros_ws
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./src:/app/ros2_ws/src
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    ports:
      - "9090:9090"
      - "8000:8000"